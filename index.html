<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>goodmorningkitty</title>
  <meta name="viewport" content="width=1280">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Supabase config gets injected here at build time. Empty values → localStorage fallback. -->
  <script>
    window.__GMK_ENV = {
      SUPABASE_URL: "",
      SUPABASE_ANON_KEY: ""
    };
  </script>
</head>
<body>

  <!-- Intro fade -->
  <div class="veil"></div>

  <!-- Stage holds Layer 1 (desk) and Layer 2 (rooms) -->
  <div class="stage" aria-label="goodmorningkitty"></div>

  <!-- Layer 3 — grids -->
  <main class="page" role="main" aria-label="Grid"></main>

  <!-- Letter reader -->
  <section class="reader" role="dialog" aria-label="Letter"></section>

  <!-- Photo lightbox -->
  <section class="lightbox" role="dialog" aria-label="Photo"></section>

  <!-- Song view -->
  <section class="song-view" role="dialog" aria-label="Song"></section>

  <!-- Corner chrome -->
  <button class="backlink corner bl" aria-label="Back" type="button">
    <span class="arr"></span><span>Back</span>
  </button>

  <!-- Discreet, fades out on landing -->
  <div class="welcome">Click around. There are three.</div>

  <script src="favourites.js"></script>
  <script src="audio.js"></script>
  <script src="scenes.js"></script>
  <script src="grids.js"></script>
  <script src="app.js"></script>
</body>
</html>
